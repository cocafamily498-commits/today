[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/markets"
  to = "/.netlify/functions/markets"
  status = 200

[[redirects]]
  from = "/api/assets"
  to = "/.netlify/functions/assets"
  status = 200

[[redirects]]
  from = "/api/quotes"
  to = "/.netlify/functions/quotes"
  status = 200
