[build]
  command = "node build.js"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/markets"
  to = "/.netlify/functions/markets"
  status = 200

[[redirects]]
  from = "/api/assets"
  to = "/.netlify/functions/assets"
  status = 200

[[redirects]]
  from = "/api/quotes"
  to = "/.netlify/functions/quotes"
  status = 200

[[redirects]]
  from = "/api/locations"
  to = "/.netlify/functions/locations"
  status = 200

[[redirects]]
  from = "/api/weather"
  to = "/.netlify/functions/weather"
  status = 200

[[redirects]]
  from = "/api/lunar-to-solar"
  to = "/.netlify/functions/lunar-to-solar"
  status = 200
