<section id="appInfoTab" class="tab-panel app-info-tab" role="tabpanel" aria-labelledby="appInfoTabButton" hidden>
  <article class="app-info-page system-settings-page">
    <header class="app-info-dialog-header">
      <h1>Cài đặt/hệ thống</h1>
    </header>
    <div class="app-info-dialog-body">
      <div class="system-settings-actions">
        <button id="appInfoButton" class="system-settings-button" type="button">Thông tin ứng dụng</button>
        <button id="systemInstallButton" class="system-settings-button" type="button">Cài đặt ứng dụng</button>
        <button id="systemExportButton" class="system-settings-button" type="button">Export data</button>
        <button id="systemImportButton" class="system-settings-button" type="button">Import data</button>
        <input id="systemImportInput" type="file" accept=".zip,application/zip,application/x-zip-compressed" hidden>
      </div>
    </div>
  </article>
</section>
