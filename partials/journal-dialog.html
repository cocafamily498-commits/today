<dialog id="journalDialog" class="event-dialog journal-dialog" aria-labelledby="journalDialogHeading">
      <div class="event-dialog-content">
        <header class="event-dialog-header">
          <h2 id="journalDialogHeading" class="event-dialog-title">Tạo nhật ký/ghi chú</h2>
          <button id="journalDialogCloseButton" class="event-dialog-close" type="button" aria-label="Đóng">×</button>
        </header>
        <form id="journalForm" class="event-form journal-form" autocomplete="off">
          <div class="event-form-grid">
            <div class="event-field journal-date-field">
              <label for="journalDate">Ngày dương lịch</label>
              <input id="journalDate" name="date" type="text" autocomplete="off" placeholder="dd/mm/yyyy" pattern="\d{1,2}/\d{1,2}/\d{4}" required>
            </div>
            <div class="event-field journal-lunar-date-field">
              <label for="journalDateHint">Âm lịch</label>
              <span class="event-lunar-date-row journal-lunar-date-row">
                <input id="journalDateHint" class="event-lunar-date-display" type="text" readonly aria-label="Ngày âm được đổi từ ngày dương">
                <span id="journalLunarLeapBadge" class="event-lunar-leap-badge" hidden>nhuận</span>
              </span>
            </div>
            <div class="event-field full event-group-field journal-group-field">
              <label for="journalGroupPickerButton">Nhóm nhật ký/ghi chú</label>
              <div class="event-group-control-row">
                <div class="event-group-picker">
                  <input id="journalTypeId" name="eventTypeId" type="hidden" value="general">
                  <button id="journalGroupPickerButton" class="event-group-picker-button" type="button" aria-haspopup="listbox" aria-expanded="false">Nhóm chung</button>
                  <div id="journalGroupPickerList" class="event-group-picker-list" role="listbox" hidden></div>
                </div>
                <button id="journalGroupManageButton" class="event-group-manage-button" type="button" aria-label="Thêm hoặc quản lý nhóm sự kiện/nhật ký" title="Thêm hoặc quản lý nhóm sự kiện/nhật ký">+</button>
              </div>
            </div>
            <div class="event-field full journal-content-field">
              <label for="journalText">Nội dung</label>
              <div class="journal-text-actions" aria-label="Công cụ nội dung nhật ký">
                <button id="journalExportImageButton" class="journal-text-action" type="button" aria-label="Xuất PDF nhật ký" title="Xuất PDF nhật ký" hidden>
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v4H7V3Zm10 9h2v5h-3v4H8v-4H5v-5h2v3h10v-3Zm-3 7v-5h-4v5h4ZM6 8h12a4 4 0 0 1 4 4v6h-4v-2h2v-4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v4h2v2H2v-6a4 4 0 0 1 4-4Z"/></svg>
                </button>
                <button id="journalReadButton" class="journal-text-action" type="button" aria-label="Đọc nội dung nhật ký" title="Đọc nội dung nhật ký">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Zm12.5 3a4.5 4.5 0 0 0-2.1-3.8v7.6a4.5 4.5 0 0 0 2.1-3.8Zm-2.1-8.7v2.1a7.5 7.5 0 0 1 0 13.2v2.1a9.5 9.5 0 0 0 0-17.4Z"/></svg>
                </button>
                <button id="journalExpandButton" class="journal-text-action" type="button" aria-label="Mở rộng nội dung toàn màn hình" title="Mở rộng toàn màn hình">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v2H6v4H4V4Zm10 0h6v6h-2V6h-4V4ZM4 14h2v4h4v2H4v-6Zm14 0h2v6h-6v-2h4v-4Z"/></svg>
                </button>
              </div>
              <textarea id="journalText" name="text" class="journal-textarea" maxlength="3000" required></textarea>
            </div>
            <div class="event-field full">
              <div class="journal-image-picker">
                <input id="journalImages" class="sr-only" name="images" type="file" accept="image/*" multiple data-max-files="3" aria-label="Chọn ảnh nhật ký">
                <button id="journalAddImageButton" class="journal-add-image-button" type="button">Thêm ảnh</button>
              </div>
              <p id="journalImageSummary" class="journal-image-summary"></p>
              <div id="journalImagePreviewList" class="journal-image-preview-list" aria-label="Ảnh đính kèm"></div>
            </div>
          </div>
          <p id="journalFormStatus" class="event-form-status" aria-live="polite"></p>
          <div class="event-form-actions">
            <button id="journalResetButton" class="event-secondary-button" type="button">Mới</button>
            <button id="journalDeleteButton" class="event-danger-button" type="button" hidden>Xóa</button>
            <button class="event-submit" type="submit">Lưu</button>
          </div>
        </form>
      </div>
    </dialog>
    <dialog id="journalExpandedDialog" class="journal-expanded-dialog" aria-labelledby="journalExpandedDialogHeading">
      <div class="journal-expanded-content">
        <header class="event-dialog-header journal-expanded-header">
          <h2 id="journalExpandedDialogHeading" class="event-dialog-title">Nội dung nhật ký/ghi chú</h2>
        </header>
        <div class="journal-expanded-body">
          <label class="sr-only" for="journalExpandedText">Nội dung nhật ký/ghi chú</label>
          <textarea id="journalExpandedText" maxlength="3000"></textarea>
        </div>
        <footer class="journal-expanded-footer">
          <button id="journalExpandedCloseButton" class="event-secondary-button" type="button">Đóng</button>
        </footer>
      </div>
    </dialog>
    <dialog id="journalTemplateDialog" class="journal-template-dialog" aria-labelledby="journalTemplateDialogHeading">
      <div class="journal-template-dialog-content">
        <header class="journal-template-dialog-header">
          <div>
            <h2 id="journalTemplateDialogHeading">Chọn mẫu in</h2>
            <p>Chọn mẫu dùng cho toàn bộ các trang trong file PDF.</p>
          </div>
          <button id="journalTemplateDialogCloseButton" type="button" aria-label="Đóng">×</button>
        </header>
        <div class="journal-template-grid">
          <button class="journal-template-option" type="button" data-journal-template="journal">
            <img src="assets/journal-template.jpg" alt="" loading="lazy">
            <strong>Nhật ký</strong>
          </button>
          <button class="journal-template-option" type="button" data-journal-template="note">
            <img src="assets/note-template.jpg" alt="" loading="lazy">
            <strong>Ghi chú</strong>
          </button>
        </div>
      </div>
    </dialog>
    <dialog id="journalPdfViewerDialog" class="journal-pdf-viewer-dialog" aria-labelledby="journalPdfViewerHeading">
      <div class="journal-pdf-viewer">
        <header class="journal-pdf-toolbar">
          <h2 id="journalPdfViewerHeading">Xem PDF nhật ký</h2>
          <div class="journal-pdf-toolbar-group journal-pdf-page-controls" aria-label="Điều hướng trang">
            <button type="button" data-pdf-action="previous" aria-label="Trang trước" title="Trang trước">‹</button>
            <input id="journalPdfPageInput" type="number" min="1" value="1" aria-label="Số trang hiện tại">
            <span>/ <span id="journalPdfPageCount">1</span></span>
            <button type="button" data-pdf-action="next" aria-label="Trang sau" title="Trang sau">›</button>
          </div>
          <div class="journal-pdf-toolbar-group" aria-label="Thu phóng">
            <button type="button" data-pdf-action="zoom-out" aria-label="Thu nhỏ" title="Thu nhỏ">−</button>
            <span id="journalPdfZoomLabel" class="journal-pdf-zoom-label">100%</span>
            <button type="button" data-pdf-action="zoom-in" aria-label="Phóng to" title="Phóng to">+</button>
            <button type="button" data-pdf-action="fit" aria-label="Vừa trang" title="Vừa trang">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5"/></svg>
            </button>
            <button type="button" data-pdf-action="rotate" aria-label="Xoay trang" title="Xoay trang">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h4V3M6.2 17.8A8 8 0 1 0 5 7l4-4"/></svg>
            </button>
          </div>
          <div class="journal-pdf-toolbar-group journal-pdf-file-actions" aria-label="Công cụ PDF">
            <button type="button" data-pdf-action="fullscreen" aria-label="Toàn màn hình" title="Toàn màn hình">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5"/></svg>
            </button>
            <button type="button" data-pdf-action="download" aria-label="Tải PDF" title="Tải PDF">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m-4-4 4 4 4-4M5 19h14"/></svg>
            </button>
            <button type="button" data-pdf-action="print" aria-label="In PDF" title="In PDF">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v5H7zM6 17H3v-7h18v7h-3M7 14h10v7H7z"/></svg>
            </button>
            <button class="journal-pdf-close-button" type="button" data-pdf-action="close" aria-label="Đóng trình xem PDF" title="Đóng">×</button>
          </div>
        </header>
        <div id="journalPdfViewerStage" class="journal-pdf-viewer-stage">
          <div id="journalPdfViewerStatus" class="journal-pdf-viewer-status" role="status" aria-live="polite">Đang tạo PDF nhật ký...</div>
          <canvas id="journalPdfViewerCanvas" aria-label="Trang PDF hiện tại"></canvas>
        </div>
      </div>
    </dialog>
